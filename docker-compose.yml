services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gammaray
      POSTGRES_PASSWORD: gammaray
      POSTGRES_DB: gammaray
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gammaray"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      API_PORT: 3001
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: gammaray
      DATABASE_PASSWORD: gammaray
      DATABASE_NAME: gammaray
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages

  frontend:
    build:
      context: .
      dockerfile: apps/app-one/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./apps/app-one/src:/app/apps/app-one/src
      - ./packages:/app/packages

volumes:
  postgres_data:
