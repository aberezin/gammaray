services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gammaray
      POSTGRES_PASSWORD: gammaray
      POSTGRES_DB: gammaray
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gammaray"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
