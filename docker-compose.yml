services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gammaray
      POSTGRES_PASSWORD: gammaray
      POSTGRES_DB: gammaray
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gammaray"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      API_PORT: 3001
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: gammaray
      DATABASE_PASSWORD: gammaray
      DATABASE_NAME: gammaray
      # CORS allowed origins for the shared API: both example frontends'
      # published host URLs (notesync :3000, music :3010). Keys off the same PORT
      # vars they publish on, so parallel instances allow their own origins
      # (see apps/api/src/main.ts).
      NEXTAUTH_URL: http://localhost:${PORT:-3000}
      CORS_ORIGINS: http://localhost:${PORT:-3000},http://localhost:${MUSIC_PORT:-3010}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages

  frontend:
    build:
      context: .
      dockerfile: apps/example/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      # Browser-side calls (RxDB sync, GraphQL, register) run in the user's
      # browser on the host, so they reach the API via its *published host* port.
      # Keys off API_PORT so each parallel instance targets its own API, not
      # another instance's.
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-3001}
      # Server-side calls (NextAuth authorize/refresh in the Next process) run
      # inside this container, where the API is the `api` compose service on its
      # fixed internal port — NOT localhost. See apps/example/src/auth.ts.
      API_INTERNAL_URL: http://api:3001
      # Let NextAuth trust the incoming host/port (instances run on different
      # host ports); avoids hard-coding a single callback URL.
      AUTH_TRUST_HOST: "true"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./apps/example/src:/app/apps/example/src
      - ./packages:/app/packages

  # The second example app ("Crate" music library) — same shared API + Postgres
  # (Phase 1). Served on :3010 so it runs alongside the notesync frontend (:3000).
  music:
    build:
      context: .
      dockerfile: apps/music/Dockerfile
    ports:
      - "${MUSIC_PORT:-3010}:3010"
    environment:
      NODE_ENV: development
      PORT: 3010
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-3001}
      API_INTERNAL_URL: http://api:3001
      AUTH_TRUST_HOST: "true"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./apps/music/src:/app/apps/music/src
      - ./packages:/app/packages

volumes:
  postgres_data:
